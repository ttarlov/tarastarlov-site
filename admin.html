<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Admin · Taras Tarlov</title>
<style>
  :root{
    --ink:#1a1424; --paper:#f4ead6; --cream:#fbe9c8; --teal:#19c2c9;
    --pink:#ff4d97; --orange:#ff8a3d; --road:#2a2238; --line:rgba(251,233,200,.18);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:var(--ink);color:var(--cream);line-height:1.5;
    padding:clamp(18px,5vw,48px);-webkit-font-smoothing:antialiased}
  .wrap{max-width:760px;margin:0 auto}
  h1{font-size:clamp(24px,5vw,38px);letter-spacing:-.01em;margin-bottom:4px}
  h2{font-size:15px;text-transform:uppercase;letter-spacing:.14em;color:var(--teal);
    margin:36px 0 14px;border-bottom:1px solid var(--line);padding-bottom:8px}
  .sub{color:#b9ad9a;font-size:14px;margin-bottom:8px}
  label{display:block;font-size:13px;color:#b9ad9a;margin:14px 0 6px}
  input[type=password],input[type=text]{width:100%;padding:11px 13px;border-radius:7px;
    border:1px solid var(--line);background:var(--road);color:var(--cream);font-size:15px}
  input[type=file]{width:100%;font-size:14px;color:#b9ad9a;padding:10px 0}
  button{font:inherit;cursor:pointer;border:0;border-radius:7px;padding:11px 18px;
    background:var(--teal);color:var(--ink);font-weight:600;transition:opacity .2s}
  button:hover{opacity:.88}
  button:disabled{opacity:.45;cursor:not-allowed}
  button.ghost{background:transparent;color:var(--cream);border:1px solid var(--line)}
  button.danger{background:transparent;color:var(--pink);border:1px solid rgba(255,77,151,.5);
    padding:7px 12px;font-size:13px}
  .queue,.manage{margin-top:16px;display:flex;flex-direction:column;gap:12px}
  .row{display:flex;gap:14px;align-items:center;background:var(--road);
    border:1px solid var(--line);border-radius:9px;padding:10px}
  .row img{width:72px;height:72px;object-fit:cover;border-radius:6px;background:var(--ink);flex:none}
  .row .meta{flex:1;min-width:0}
  .row .meta input{margin-top:4px}
  .row .name{font-size:13px;color:#b9ad9a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .status{font-size:13px;margin-top:4px}
  .status.ok{color:var(--teal)} .status.err{color:var(--pink)}
  .bar{display:flex;gap:12px;align-items:center;margin-top:18px;flex-wrap:wrap}
  .msg{font-size:14px}
  a.back{color:var(--teal);font-size:14px;text-decoration:none}
  .hint{font-size:12px;color:#8a7f6f;margin-top:6px}
</style>
</head>
<body>
<div class="wrap">
  <h1>Photo admin</h1>
  <p class="sub">Upload to the live gallery. Images are downscaled in your browser, then processed and stored — your repo is never touched.</p>
  <a class="back" href="/">← back to site</a>

  <h2>Auth</h2>
  <label for="pw">Admin password</label>
  <input id="pw" type="password" autocomplete="current-password" placeholder="from Vercel env" />
  <p class="hint">Held in this tab only. Required for upload and delete.</p>

  <h2>Upload</h2>
  <input id="files" type="file" accept="image/jpeg,image/png,image/webp" multiple />
  <div id="queue" class="queue"></div>
  <div class="bar">
    <button id="go" disabled>Upload</button>
    <span id="msg" class="msg"></span>
  </div>

  <h2>Manage <button id="refresh" class="ghost" style="float:right;padding:6px 12px;font-size:13px">Refresh</button></h2>
  <div id="manage" class="manage"></div>
</div>

<script>
  const $ = s => document.querySelector(s);
  const pw = $('#pw'), filesIn = $('#files'), queueEl = $('#queue'),
        goBtn = $('#go'), msg = $('#msg'), manageEl = $('#manage');
  let queue = [];   // { file, dataUrl, b64, altInput, statusEl }

  const MAX_EDGE = 2000, QUALITY = 0.85;

  // downscale to <= MAX_EDGE longest edge, return a JPEG data URL
  function downscale(file){
    return new Promise((resolve, reject) => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        let { width:w, height:h } = img;
        const s = Math.min(1, MAX_EDGE / Math.max(w, h));
        w = Math.round(w * s); h = Math.round(h * s);
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        resolve(c.toDataURL('image/jpeg', QUALITY));
      };
      img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('decode failed')); };
      img.src = url;
    });
  }

  function defaultAlt(name){
    return name.replace(/\.[^.]+$/, '').replace(/^\d+[-_ ]*/, '')
      .replace(/[-_]+/g, ' ').trim().replace(/\b\w/g, c => c.toUpperCase());
  }

  filesIn.addEventListener('change', async () => {
    queue = []; queueEl.innerHTML = ''; msg.textContent = '';
    for (const file of filesIn.files){
      const row = document.createElement('div'); row.className = 'row';
      const altInput = document.createElement('input');
      altInput.type = 'text'; altInput.value = defaultAlt(file.name);
      altInput.placeholder = 'Caption / alt text';
      const statusEl = document.createElement('div'); statusEl.className = 'status';
      const item = { file, b64:null, altInput, statusEl };
      try {
        const dataUrl = await downscale(file);
        item.b64 = dataUrl.split(',')[1];
        row.innerHTML = `<img src="${dataUrl}" alt=""><div class="meta"><div class="name">${file.name}</div></div>`;
      } catch {
        row.innerHTML = `<div class="meta"><div class="name">${file.name}</div></div>`;
        statusEl.className = 'status err'; statusEl.textContent = 'could not read image';
      }
      row.querySelector('.meta').append(altInput, statusEl);
      queueEl.appendChild(row);
      queue.push(item);
    }
    goBtn.disabled = !queue.length;
  });

  goBtn.addEventListener('click', async () => {
    if (!pw.value) { msg.textContent = 'Enter the admin password first.'; return; }
    goBtn.disabled = true; msg.textContent = 'Uploading…';
    let ok = 0;
    for (const item of queue){
      if (!item.b64) continue;
      item.statusEl.className = 'status'; item.statusEl.textContent = 'uploading…';
      try {
        const r = await fetch('/api/upload', {
          method: 'POST',
          headers: { 'content-type': 'application/json', 'x-admin-token': pw.value },
          body: JSON.stringify({ data: item.b64, name: item.file.name, alt: item.altInput.value }),
        });
        const j = await r.json().catch(() => ({}));
        if (r.ok) { item.statusEl.className = 'status ok'; item.statusEl.textContent = '✓ ' + j.entry.id; ok++; }
        else { item.statusEl.className = 'status err'; item.statusEl.textContent = '✗ ' + (j.error || r.status); }
      } catch (e) {
        item.statusEl.className = 'status err'; item.statusEl.textContent = '✗ ' + e.message;
      }
    }
    msg.textContent = `Done — ${ok}/${queue.length} uploaded.`;
    goBtn.disabled = false;
    loadManage();
  });

  async function loadManage(){
    manageEl.innerHTML = '<p class="sub">Loading…</p>';
    try {
      const { base, photos } = await fetch('/api/photos', { cache:'no-store' }).then(r => r.json());
      if (!photos.length) { manageEl.innerHTML = '<p class="sub">No photos yet.</p>'; return; }
      manageEl.innerHTML = '';
      for (const p of photos){
        const sm = p.sizes[0];
        const row = document.createElement('div'); row.className = 'row';
        row.innerHTML =
          `<img src="${base}${p.id}-${sm}.webp" alt="" loading="lazy">
           <div class="meta"><div class="name">${p.alt}</div>
             <div class="name" style="opacity:.6">${p.id} · ${p.w}×${p.h}</div></div>`;
        const btn = document.createElement('button');
        btn.className = 'danger'; btn.textContent = 'Delete';
        btn.addEventListener('click', () => removePhoto(p.id, row, btn));
        row.appendChild(btn);
        manageEl.appendChild(row);
      }
    } catch {
      manageEl.innerHTML = '<p class="sub">Could not load photos.</p>';
    }
  }

  async function removePhoto(id, row, btn){
    if (!pw.value) { msg.textContent = 'Enter the admin password to delete.'; return; }
    if (!confirm(`Delete "${id}"? This cannot be undone.`)) return;
    btn.disabled = true; btn.textContent = 'Deleting…';
    try {
      const r = await fetch('/api/delete', {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'x-admin-token': pw.value },
        body: JSON.stringify({ id }),
      });
      if (r.ok) row.remove();
      else { const j = await r.json().catch(() => ({})); btn.disabled = false; btn.textContent = 'Delete';
             msg.textContent = 'Delete failed: ' + (j.error || r.status); }
    } catch (e) { btn.disabled = false; btn.textContent = 'Delete'; msg.textContent = 'Delete failed: ' + e.message; }
  }

  $('#refresh').addEventListener('click', loadManage);
  loadManage();
</script>
</body>
</html>
